<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Easy Menu</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <!-- Model Viewer for standard WebXR -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <header class="app-header">
        <button class="icon-button back-btn" aria-label="Go back">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <h1 class="brand-name">Easy Menu</h1>
        <button class="icon-button cart-btn" aria-label="Cart">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        </button>
      </header>

      <main class="product-container">
        <div class="image-container">
          <model-viewer
            id="dish-model"
            src="/dish.glb"
            poster="/pizza.png"
            reveal="manual"
            loading="eager"
            ar
            ar-modes="webxr scene-viewer quick-look"
            xr-environment
            class="dish-image"
            style="width: 100%; height: 100%; min-height: 300px; --poster-color: transparent;"
          >
            <!-- Hidden native AR button for proxy clicking -->
            <button slot="ar-button" id="internal-ar-button" style="display: none;">Launch AR</button>

            <!-- Hotspots - Piccante Pizza ingredients -->
            <!-- Far-left: Nduja -->
            <button class="hotspot nduja" slot="hotspot-nduja" data-position="-0.18 0.05 -0.04" data-normal="0 1 0">
              <div class="hotspot-content">
                <div class="hotspot-header"><span class="icon">🌶️</span> Nduja</div>
                <div class="hotspot-desc">▪ Spicy Spread<br>▪ Rich Flavor</div>
              </div>
            </button>
            <!-- Back-left: Mozzarella -->
            <button class="hotspot mozzarella" slot="hotspot-mozzarella" data-position="-0.12 0.05 -0.16" data-normal="0 1 0">
              <div class="hotspot-content">
                <div class="hotspot-header"><span class="icon">🧀</span> Mozzarella</div>
                <div class="hotspot-desc">▪ High Calcium<br>▪ Fresh & Creamy</div>
              </div>
            </button>
            <!-- Back-right: Jalapeños -->
            <button class="hotspot jalapeno" slot="hotspot-jalapeno" data-position="0.12 0.05 -0.16" data-normal="0 1 0">
              <div class="hotspot-content">
                <div class="hotspot-header"><span class="icon">🫑</span> Jalapeño</div>
                <div class="hotspot-desc">▪ Capsaicin Boost<br>▪ Metabolism+</div>
              </div>
            </button>
            <!-- Far-right: Roasted Peppers -->
            <button class="hotspot peppers" slot="hotspot-peppers" data-position="0.18 0.05 -0.04" data-normal="0 1 0">
              <div class="hotspot-content">
                <div class="hotspot-header"><span class="icon">🫑</span> Peppers</div>
                <div class="hotspot-desc">▪ Vitamin C<br>▪ Smoky & Sweet</div>
              </div>
            </button>
            <!-- Center-top: Tomato Sauce -->
            <button class="hotspot sauce" slot="hotspot-sauce" data-position="0 0.07 0" data-normal="0 1 0">
              <div class="hotspot-content">
                <div class="hotspot-header"><span class="icon">🍅</span> Tomato Sauce</div>
                <div class="hotspot-desc">▪ San Marzano<br>▪ Antioxidants</div>
              </div>
            </button>
            <!-- Front-left: Basil -->
            <button class="hotspot basil label-bottom" slot="hotspot-basil" data-position="-0.12 0.05 0.12" data-normal="0 1 0">
              <div class="hotspot-content">
                <div class="hotspot-header"><span class="icon">🌿</span> Basil</div>
                <div class="hotspot-desc">▪ Fresh Herb<br>▪ Anti-Inflammatory</div>
              </div>
            </button>
            <!-- Front-right: Crust -->
            <button class="hotspot crust label-bottom" slot="hotspot-crust" data-position="0.12 0.05 0.12" data-normal="0 1 0">
              <div class="hotspot-content">
                <div class="hotspot-header"><span class="icon">🍕</span> Crust</div>
                <div class="hotspot-desc">▪ Wood-Fired<br>▪ Neapolitan Style</div>
              </div>
            </button>
            
            <!-- AR UI Overlay (Visible only in AR) -->
            <div class="ar-ui-overlay">
              <div class="ar-ui-details">
                <h3 class="ar-ui-title">Piccante Pizza</h3>
                <span class="ar-ui-price">$22.00</span>
              </div>
              <button class="btn-primary ar-order-btn">ADD TO ORDER</button>
            </div>
          </model-viewer>
        </div>

        <div class="product-details">
          <div class="carousel-indicators">
            <span class="indicator active"></span>
            <span class="indicator"></span>
            <span class="indicator"></span>
          </div>

          <h2 class="product-title">Piccante Pizza 🔥</h2>
          
          <div class="product-meta">
            <span class="price">$22.00</span>
            <span class="calories">850 Calories</span>
          </div>

          <div class="tags-container">
            <span class="tag">NDUJA</span>
            <span class="tag">MOZZARELLA</span>
            <span class="tag">JALAPEÑO</span>
            <span class="tag">BASIL</span>
            <span class="tag">PEPPERS</span>
          </div>

          <div class="actions-container">
            <button class="btn-primary">ADD TO ORDER</button>
            <button class="btn-secondary" onclick="window.location.href='/ar.html'">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 8px;">
                <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                <line x1="12" y1="22.08" x2="12" y2="12"></line>
              </svg>
              VIEW ON YOUR TABLE
            </button>
            <button class="btn-secondary" id="export-usdz" style="margin-top: 10px; border-color: red; color: red;">🛠️ Generate iOS AR File</button>
          </div>
        </div>
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
